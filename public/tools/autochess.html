<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Chess Tactics: Reign</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background:#0f172a; color:#e2e8f0; }
    canvas { image-rendering: crisp-edges; }
    .unit-btn.active { outline:2px solid #38bdf8; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-4">
    <div class="bg-slate-900 rounded-xl p-3 border border-slate-700">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-xl font-bold">Auto Chess Tactics: Reign</h1>
        <a href="../main.html" class="text-sm text-sky-300 hover:text-sky-200">← 戻る</a>
      </div>
      <canvas id="battlefield" width="800" height="800" class="w-full max-w-[800px] aspect-square bg-slate-950 rounded-lg border border-slate-700"></canvas>
      <p class="mt-2 text-xs text-slate-400">配置フェーズ: 右半分に味方を配置。右クリックで削除。戦闘は0.1秒移動更新 / 0.5秒行動判定。</p>
    </div>

    <aside class="bg-slate-900 rounded-xl p-4 border border-slate-700 space-y-3">
      <div class="text-sm">フェーズ: <span id="phase" class="font-semibold text-emerald-300">配置</span></div>
      <div class="text-sm">コスト: <span id="cost" class="font-semibold">0 / 100</span></div>
      <div id="unit-buttons" class="grid grid-cols-2 gap-2"></div>
      <div class="flex gap-2">
        <button id="terrain-btn" class="flex-1 bg-violet-600 hover:bg-violet-500 text-white py-2 rounded">地形再生成</button>
        <button id="start-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded">バトル開始</button>
      </div>
      <button id="reset-btn" class="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded">リセット</button>
      <div class="text-xs text-slate-300 leading-relaxed" id="status">敵AIは先行配置済みです。ユニットを置いて開始してください。</div>
      <div class="text-xs bg-slate-800 rounded p-2 h-48 overflow-auto" id="log"></div>
    </aside>
  </div>

  <script>
    const GRID_SIZE = 20;
    const CELL = 40;
    const MOVE_TICK = 0.1;
    const ACTION_TICK = 0.5;
    const PLAYER_BUDGET = 100;

    const UNIT_DEFS = {
      pawn: { name:'ポーン', cost:10, hp:80, atk:15, interval:1.2, speed:1.5, range:1, role:'wall', color:'#fbbf24' },
      knight: { name:'ナイト', cost:20, hp:90, atk:20, interval:1.0, speed:3.0, range:1, role:'assassin', color:'#a78bfa', ignoreWalls:true },
      rook: { name:'ルーク', cost:25, hp:220, atk:18, interval:1.5, speed:1.0, range:1, role:'tank', color:'#34d399', dmgReduction:0.1 },
      bishop: { name:'ビショップ', cost:25, hp:180, atk:12, interval:1.3, speed:1.2, range:2, role:'support', color:'#22d3ee', healChance:0.2 },
      queen: { name:'クイーン', cost:40, hp:150, atk:35, interval:0.9, speed:2.0, range:2, role:'aoe', color:'#f472b6', splash:1 },
      king: { name:'キング', cost:50, hp:300, atk:20, interval:1.4, speed:1.0, range:1, role:'buff', color:'#f87171', aura:2, auraBuff:0.1 }
    };

    const canvas = document.getElementById('battlefield');
    const ctx = canvas.getContext('2d');
    const phaseEl = document.getElementById('phase');
    const costEl = document.getElementById('cost');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const unitButtons = document.getElementById('unit-buttons');

    let selected = 'pawn';
    let phase = 'placement';
    let units = [];
    let walls = new Set();
    let effects = [];
    let nextId = 1;
    let actionAccumulator = 0;
    let moveAccumulator = 0;
    let lastTs = 0;

    function addLog(msg) {
      const line = document.createElement('div');
      line.textContent = `• ${msg}`;
      logEl.prepend(line);
      if (logEl.children.length > 80) logEl.removeChild(logEl.lastChild);
    }

    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function key(x,y){ return `${x},${y}`; }
    function dist(a,b){ return Math.hypot(a.x - b.x, a.y - b.y); }
    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function createUnit(type, team, x, y){
      const d = UNIT_DEFS[type];
      return {
        id: nextId++,
        type,
        team,
        x:x+0.5,
        y:y+0.5,
        gx:x,
        gy:y,
        hp:d.hp,
        maxHp:d.hp,
        cd:0,
        dead:false,
        wallFollow: null
      };
    }

    function getUsedCost(){
      return units.filter(u=>u.team==='player').reduce((s,u)=>s+UNIT_DEFS[u.type].cost,0);
    }

    function setupUnitButtons(){
      unitButtons.innerHTML = '';
      Object.entries(UNIT_DEFS).forEach(([k,v])=>{
        const btn = document.createElement('button');
        btn.className = `unit-btn text-left p-2 rounded bg-slate-800 hover:bg-slate-700 text-xs`;
        btn.dataset.type = k;
        btn.innerHTML = `<div class="font-semibold">${v.name}</div><div class="text-slate-300">cost:${v.cost} HP:${v.hp}</div>`;
        btn.onclick = () => { selected = k; document.querySelectorAll('.unit-btn').forEach(el=>el.classList.remove('active')); btn.classList.add('active'); };
        unitButtons.appendChild(btn);
      });
      unitButtons.firstChild.classList.add('active');
    }

    function generateTerrain(){
      walls.clear();
      const modes = ['center','split','maze'];
      const mode = modes[randInt(0,modes.length-1)];
      if (mode === 'center') {
        for (let x=7; x<=12; x++) for (let y=8; y<=11; y++) if (Math.random()>0.25) walls.add(key(x,y));
      } else if (mode === 'split') {
        const gapStart = randInt(7,11);
        for (let y=1; y<19; y++) if (!(y>=gapStart && y<gapStart+3)) walls.add(key(10,y));
      } else {
        for (let x=4; x<16; x+=2) for (let y=2; y<18; y++) if (Math.random()>0.35) walls.add(key(x,y));
      }
    }

    function deployEnemy(){
      const choices = Object.keys(UNIT_DEFS);
      let budget = PLAYER_BUDGET;
      while (budget >= 10) {
        const affordable = choices.filter(c => UNIT_DEFS[c].cost <= budget);
        if (!affordable.length) break;
        const type = affordable[randInt(0,affordable.length-1)];
        let tries = 0;
        while (tries++ < 50) {
          const x = randInt(1,7), y = randInt(1,18);
          if (walls.has(key(x,y))) continue;
          if (units.some(u => Math.floor(u.x)===x && Math.floor(u.y)===y)) continue;
          units.push(createUnit(type,'enemy',x,y));
          budget -= UNIT_DEFS[type].cost;
          break;
        }
        if (tries >= 50) break;
      }
      addLog('敵軍が先行配置を完了。');
    }

    function resetGame() {
      phase = 'placement';
      units = [];
      effects = [];
      nextId = 1;
      actionAccumulator = 0;
      moveAccumulator = 0;
      generateTerrain();
      deployEnemy();
      updateUI();
      statusEl.textContent = '敵AIは先行配置済みです。ユニットを置いて開始してください。';
    }

    function findTarget(unit){
      const enemies = units.filter(u=>!u.dead && u.team!==unit.team);
      if (!enemies.length) return null;
      let best = null, bestScore = Infinity;
      for (const e of enemies) {
        const d = dist(unit,e);
        const hpRatio = e.hp / e.maxHp;
        const isKing = e.type === 'king' ? -0.8 : 0;
        const isRanged = UNIT_DEFS[e.type].range > 1 ? -0.4 : 0;
        const score = d + hpRatio*0.8 + isKing + isRanged;
        if (score < bestScore) { bestScore = score; best = e; }
      }
      return best;
    }

    function occupied(x,y,ignoreId){
      return units.some(u=>!u.dead && u.id !== ignoreId && Math.floor(u.x)===x && Math.floor(u.y)===y);
    }

    function canEnterCell(unit, x, y) {
      if (x < 0 || y < 0 || x >= GRID_SIZE || y >= GRID_SIZE) return false;
      const d = UNIT_DEFS[unit.type];
      if (!d.ignoreWalls && walls.has(key(x, y))) return false;
      if (occupied(x, y, unit.id)) return false;
      return true;
    }

    function attemptVectorMove(unit, vx, vy, step) {
      const len = Math.hypot(vx, vy);
      if (!len) return false;
      let nx = unit.x + (vx / len) * step;
      let ny = unit.y + (vy / len) * step;
      nx = clamp(nx, 0.5, GRID_SIZE - 0.5);
      ny = clamp(ny, 0.5, GRID_SIZE - 0.5);
      const gx = Math.floor(nx), gy = Math.floor(ny);
      if (!canEnterCell(unit, gx, gy)) return false;
      unit.x = nx;
      unit.y = ny;
      return true;
    }

    function tryMove(unit, target, dt){
      const d = UNIT_DEFS[unit.type];
      const dx = target.x - unit.x;
      const dy = target.y - unit.y;
      const step = d.speed * dt;

      if (attemptVectorMove(unit, dx, dy, step)) {
        unit.wallFollow = null;
        return;
      }

      // 壁直撃時は壁沿いに移動して停滞を回避
      if (!unit.wallFollow || unit.wallFollow.ttl <= 0) {
        unit.wallFollow = { side: Math.random() > 0.5 ? 1 : -1, ttl: 1.2 };
      }
      const side = unit.wallFollow.side;
      const tx = -dy * side;
      const ty = dx * side;
      const movedAlongWall =
        attemptVectorMove(unit, tx, ty, step) ||
        attemptVectorMove(unit, Math.sign(tx), 0, step) ||
        attemptVectorMove(unit, 0, Math.sign(ty), step);

      if (!movedAlongWall) {
        unit.wallFollow.side *= -1;
        const rtx = -dy * unit.wallFollow.side;
        const rty = dx * unit.wallFollow.side;
        if (!attemptVectorMove(unit, rtx, rty, step)) {
          // 最後に敵へ接近しない軸移動を許可
          attemptVectorMove(unit, Math.sign(dx), 0, step) || attemptVectorMove(unit, 0, Math.sign(dy), step);
        }
      }
      unit.wallFollow.ttl -= dt;
    }

    function getAuraMultiplier(attacker){
      const allies = units.filter(u=>!u.dead && u.team===attacker.team && u.type==='king');
      for (const king of allies) if (dist(attacker, king) <= UNIT_DEFS.king.aura) return 1 + UNIT_DEFS.king.auraBuff;
      return 1;
    }

    function attack(attacker, target){
      const ad = UNIT_DEFS[attacker.type];
      const raw = ad.atk * getAuraMultiplier(attacker);
      const td = UNIT_DEFS[target.type];
      const reduction = td.dmgReduction || 0;
      const damage = Math.round(raw * (1 - reduction));

      if (attacker.type === 'queen') {
        for (const victim of units.filter(u=>!u.dead && u.team!==attacker.team && dist(u,target)<=ad.splash+0.01)) {
          victim.hp -= damage;
          effects.push({type:'explosion', x:victim.x, y:victim.y, t:0.25});
        }
      } else {
        target.hp -= damage;
        effects.push({type: ad.range>1 ? 'projectile' : 'shock', x:target.x, y:target.y, t:0.18});
      }

      if (attacker.type === 'bishop' && Math.random() < ad.healChance) {
        const mates = units.filter(u=>!u.dead && u.team===attacker.team && u.id!==attacker.id);
        mates.sort((a,b)=>dist(attacker,a)-dist(attacker,b));
        if (mates[0]) {
          mates[0].hp = Math.min(mates[0].maxHp, mates[0].hp + 10);
          effects.push({type:'heal',x:mates[0].x,y:mates[0].y,t:0.35});
        }
      }
      attacker.cd = ad.interval;
    }

    function processTurn(){
      const alive = units.filter(u=>!u.dead);
      alive.sort((a,b)=>(UNIT_DEFS[b.type].speed - UNIT_DEFS[a.type].speed) || (Math.random()-0.5));
      for (const u of alive) {
        if (u.dead) continue;
        u.cd = Math.max(0, u.cd - ACTION_TICK);
        const target = findTarget(u);
        if (!target) continue;
        if (dist(u,target) <= UNIT_DEFS[u.type].range + 0.05) {
          if (u.cd <= 0) attack(u,target);
        }
      }
      for (const u of units) if (u.hp <= 0) u.dead = true;
      units = units.filter(u=>!u.dead);
      const p = units.some(u=>u.team==='player');
      const e = units.some(u=>u.team==='enemy');
      if (!p || !e) {
        phase = 'ended';
        phaseEl.textContent = '終了';
        statusEl.textContent = p ? '勝利！敵軍を殲滅しました。' : '敗北… 自軍が全滅しました。';
        addLog(statusEl.textContent);
      }
    }

    function processMovement(dt){
      for (const u of units) {
        const target = findTarget(u);
        if (!target) continue;
        if (dist(u,target) > UNIT_DEFS[u.type].range) tryMove(u,target,dt);
      }
    }

    function render(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (let x=0;x<GRID_SIZE;x++) for (let y=0;y<GRID_SIZE;y++) {
        ctx.strokeStyle = '#1e293b';
        ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
      }
      for (const w of walls) {
        const [x,y] = w.split(',').map(Number);
        ctx.fillStyle = '#475569';
        ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
      }
      for (const u of units) {
        const d = UNIT_DEFS[u.type];
        const cx = u.x * CELL, cy = u.y * CELL;
        ctx.beginPath();
        ctx.fillStyle = d.color;
        ctx.arc(cx, cy, CELL*0.32,0,Math.PI*2);
        ctx.fill();
        if (u.team==='enemy') { ctx.strokeStyle='#ef4444'; ctx.lineWidth=2; ctx.stroke(); }
        const ratio = Math.max(0, u.hp/u.maxHp);
        ctx.fillStyle = '#0f172a'; ctx.fillRect(cx-14, cy-22, 28, 4);
        ctx.fillStyle = ratio>0.5?'#22c55e':ratio>0.2?'#f59e0b':'#ef4444'; ctx.fillRect(cx-14, cy-22, 28*ratio, 4);
        if (u.type === 'king') {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(250,204,21,0.5)';
          ctx.arc(cx,cy,UNIT_DEFS.king.aura*CELL,0,Math.PI*2);
          ctx.stroke();
        }
      }
      for (const ef of effects) {
        const ex = ef.x*CELL, ey = ef.y*CELL;
        if (ef.type==='shock') { ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(ex,ey,(0.2-ef.t)*80,0,Math.PI*2); ctx.fill(); }
        if (ef.type==='projectile') { ctx.fillStyle='rgba(56,189,248,0.65)'; ctx.beginPath(); ctx.arc(ex,ey,8,0,Math.PI*2); ctx.fill(); }
        if (ef.type==='explosion') { ctx.fillStyle='rgba(251,113,133,0.45)'; ctx.beginPath(); ctx.arc(ex,ey,(0.3-ef.t)*120,0,Math.PI*2); ctx.fill(); }
        if (ef.type==='heal') { ctx.fillStyle='rgba(74,222,128,0.55)'; ctx.beginPath(); ctx.arc(ex,ey,10,0,Math.PI*2); ctx.fill(); }
        ef.t -= 0.016;
      }
      effects = effects.filter(e=>e.t>0);
    }

    function updateUI(){
      costEl.textContent = `${getUsedCost()} / ${PLAYER_BUDGET}`;
      phaseEl.textContent = phase === 'placement' ? '配置' : phase === 'battle' ? '戦闘' : '終了';
    }

    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('mousedown', (e)=>{
      if (phase !== 'placement') return;
      const r = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX-r.left) / (r.width/canvas.width) / CELL);
      const y = Math.floor((e.clientY-r.top) / (r.height/canvas.height) / CELL);
      if (x<0||y<0||x>=GRID_SIZE||y>=GRID_SIZE || walls.has(key(x,y))) return;

      if (e.button === 2) {
        units = units.filter(u => !(u.team==='player' && Math.floor(u.x)===x && Math.floor(u.y)===y));
      } else {
        if (x < 12) { statusEl.textContent = '味方は右半分(12〜19列)に配置してください。'; return; }
        if (units.some(u=>Math.floor(u.x)===x&&Math.floor(u.y)===y)) return;
        const cost = UNIT_DEFS[selected].cost;
        if (getUsedCost()+cost > PLAYER_BUDGET) { statusEl.textContent = 'コスト上限を超えます。'; return; }
        units.push(createUnit(selected,'player',x,y));
      }
      updateUI();
    });

    document.getElementById('terrain-btn').onclick = () => {
      if (phase !== 'placement') return;
      units = units.filter(u=>u.team==='player');
      generateTerrain();
      deployEnemy();
      statusEl.textContent = '地形と敵配置を再生成しました。';
      updateUI();
    };

    document.getElementById('start-btn').onclick = () => {
      if (phase !== 'placement') return;
      if (!units.some(u=>u.team==='player')) { statusEl.textContent = '味方ユニットを1体以上配置してください。'; return; }
      phase = 'battle';
      updateUI();
      statusEl.textContent = '戦闘開始。ユニットは自動で行動します。';
      addLog('バトル開始。');
    };

    document.getElementById('reset-btn').onclick = resetGame;

    function loop(ts){
      if (!lastTs) lastTs = ts;
      const dt = Math.min(0.05, (ts - lastTs)/1000);
      lastTs = ts;

      if (phase === 'battle') {
        moveAccumulator += dt;
        actionAccumulator += dt;
        while (moveAccumulator >= MOVE_TICK) { processMovement(MOVE_TICK); moveAccumulator -= MOVE_TICK; }
        while (actionAccumulator >= ACTION_TICK && phase === 'battle') { processTurn(); actionAccumulator -= ACTION_TICK; }
      }
      render();
      requestAnimationFrame(loop);
    }

    setupUnitButtons();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
