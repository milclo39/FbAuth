<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度・回転ズーム画像トリミングツール</title>
    <!-- Tailwind CSS for rich styled interface -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #0f172a; /* Slate 900 */
        }
        /* Grid background for canvas transparency visualization */
        .checkerboard {
            background-color: #1e293b;
            background-image: linear-gradient(45deg, #151f32 25%, transparent 25%), 
                              linear-gradient(-45deg, #151f32 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #151f32 75%), 
                              linear-gradient(-45deg, transparent 75%, #151f32 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col overflow-hidden">

    <!-- Header bar -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex flex-wrap items-center justify-between gap-4 z-10 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-lg text-white shadow-md shadow-indigo-900/40">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                    Rotate & Crop Studio <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2.5 py-0.5 rounded-full font-semibold border border-indigo-500/30">PRO</span>
                </h1>
                <p class="text-xs text-slate-400">回転・ズーム・反転対応のロスレス画像切り抜きツール</p>
            </div>
        </div>
        
        <!-- Status indicator / File Info -->
        <div id="file-info" class="hidden md:flex items-center gap-3 bg-slate-850 px-4 py-2 rounded-lg border border-slate-800 text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <div>
                <span class="text-xs text-slate-400 block font-medium">読み込み完了</span>
                <span id="loaded-file-name" class="font-semibold text-slate-200 truncate max-w-[200px] block">image.png</span>
            </div>
            <div class="border-l border-slate-700 h-6 ml-1 pl-3">
                <span class="text-xs text-slate-400 block font-medium">解像度</span>
                <span id="original-resolution" class="font-semibold text-slate-300">0 x 0</span>
            </div>
        </div>
    </header>

    <!-- Main workspace (Canvas + Sidebar) -->
    <main class="flex-1 flex flex-col lg:flex-row relative overflow-hidden">
        
        <!-- Dropzone / Canvas Container Area -->
        <div id="dropzone" class="flex-1 relative flex items-center justify-center p-4 min-h-[350px] lg:min-h-0 bg-slate-950 transition-colors duration-200">
            
            <!-- Empty state (Placeholder) -->
            <div id="placeholder-ui" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center cursor-pointer hover:bg-slate-900/40 transition-colors z-20 group">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <div class="w-20 h-20 mb-6 rounded-full bg-slate-900 flex items-center justify-center border-2 border-dashed border-slate-700 group-hover:border-indigo-500 group-hover:bg-slate-850 transition-all duration-300 transform group-hover:scale-105 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-slate-400 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-200 group-hover:text-white transition-colors">ここに画像をドラッグ＆ドロップ</h3>
                <p class="text-sm text-slate-400 mt-2 max-w-md">またはクリックしてファイルを選択します。JPG, PNG, WebPなどの画像に対応しています。</p>
                <div class="mt-6 px-4 py-2 bg-slate-900 border border-slate-750 text-slate-300 text-sm font-semibold rounded-lg shadow-sm group-hover:bg-indigo-600 group-hover:text-white group-hover:border-indigo-500 transition-all duration-300">
                    ファイルから開く
                </div>
            </div>

            <!-- Canvas Viewport Wrapper -->
            <div id="canvas-wrapper" class="w-full h-full flex items-center justify-center opacity-0 transition-opacity duration-300 checkerboard rounded-xl overflow-hidden shadow-2xl relative">
                <!-- Main workspace canvas -->
                <canvas id="editor-canvas" class="max-w-full max-h-full block cursor-grab active:cursor-grabbing"></canvas>
                
                <!-- Quick Floating Overlay Controls (Mode / Instructions) -->
                <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex items-center bg-slate-900/90 backdrop-blur border border-slate-750 rounded-full px-4 py-1.5 shadow-xl text-xs gap-3 font-medium text-slate-300 z-10 select-none">
                    <div class="flex items-center gap-1.5">
                        <kbd class="px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-[10px] text-indigo-400 font-bold">Wheel</kbd>
                        <span>ポインタ中心にズーム</span>
                    </div>
                    <span class="text-slate-700">|</span>
                    <div id="quick-tip" class="text-slate-300">
                        「画像操作」モードでドラッグすると移動できます
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Sidebar -->
        <aside class="w-full lg:w-[380px] bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 flex flex-col justify-between overflow-y-auto shrink-0 z-10 shadow-2xl">
            
            <div class="p-6 space-y-6">
                <!-- Mode Selector Toggles -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2.5">操作モード</label>
                    <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-800">
                        <button id="mode-nav-btn" class="flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-indigo-600 text-white shadow">
                            <!-- Drag Hand Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0V12m-3-2.5a1.5 1.5 0 013 0v1.5m-3-1.5a1.5 1.5 0 013 0v3.75a3.75 3.75 0 01-7.5 0V12a1.5 1.5 0 013 0v1.5m3-1.5a1.5 1.5 0 013 0v1.5M4 16.853a4.479 4.479 0 00-.94-.31C3.06 16.543 3 16.543 3 16.853v2.394a1.5 1.5 0 001.5 1.5h10.5a1.5 1.5 0 001.5-1.5v-2.394c0-.31-.06-.31-.06-.31a4.479 4.479 0 00-.94.31m-10.5 0L9 21l3.5-3.5L16 21l3.5-3.5m-11.5 0h8.5" />
                            </svg>
                            画像操作
                        </button>
                        <button id="mode-crop-btn" class="flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-slate-200">
                            <!-- Crop Scissors Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 11-4.243 4.243 3 3 0 014.243-4.243zm0-5.758a3 3 0 11-4.243-4.243 3 3 0 014.243 4.243z" />
                            </svg>
                            矩形選択
                        </button>
                    </div>
                </div>

                <div class="border-t border-slate-800/60 my-2"></div>

                <!-- Transform Controls -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">回転角度</label>
                        <div class="flex items-center gap-1.5">
                            <input type="number" id="rotation-number" value="0" min="-180" max="180" class="w-16 bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-xs text-right text-indigo-400 font-semibold focus:outline-none focus:border-indigo-500">
                            <span class="text-xs text-slate-500">度</span>
                        </div>
                    </div>
                    
                    <!-- Rotation Slider Control -->
                    <div class="flex items-center gap-4">
                        <button id="rotate-ccw-90" class="p-2 bg-slate-800 hover:bg-slate-750 border border-slate-700/60 hover:border-slate-650 rounded-lg text-slate-300 transition-colors" title="左に90度回転">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.034 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z" />
                            </svg>
                        </button>
                        
                        <input type="range" id="rotation-slider" min="-180" max="180" value="0" class="flex-1 accent-indigo-500 h-1.5 bg-slate-950 rounded-lg appearance-none cursor-pointer">
                        
                        <button id="rotate-cw-90" class="p-2 bg-slate-800 hover:bg-slate-750 border border-slate-700/60 hover:border-slate-650 rounded-lg text-slate-300 transition-colors" title="右に90度回転">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11.934 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.334-4z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.966 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.334-4z" />
                            </svg>
                        </button>
                    </div>

                    <!-- Flip and Reset Quick Buttons -->
                    <div class="grid grid-cols-2 gap-3 pt-1">
                        <button id="flip-horizontal-btn" class="flex items-center justify-center gap-2 py-2 px-3 bg-slate-800 hover:bg-slate-750 border border-slate-750 rounded-lg text-sm text-slate-300 font-medium transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                            </svg>
                            左右反転
                        </button>
                        <button id="reset-transforms-btn" class="flex items-center justify-center gap-2 py-2 px-3 bg-slate-800 hover:bg-rose-950 hover:text-rose-300 hover:border-rose-900 border border-slate-750 rounded-lg text-sm text-slate-400 font-medium transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.27 15" stroke-dasharray="2 2" />
                            </svg>
                            初期化
                        </button>
                    </div>
                </div>

                <div class="border-t border-slate-800/60 my-2"></div>

                <!-- Zoom Controls -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">ズーム倍率</label>
                        <span id="zoom-percentage" class="text-xs text-indigo-400 font-bold">100%</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="zoom-out-btn" class="p-2 bg-slate-800 hover:bg-slate-750 border border-slate-750 rounded-lg text-slate-300 flex-1 flex justify-center transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H6" />
                            </svg>
                        </button>
                        <button id="zoom-fit-btn" class="px-3 py-2 bg-slate-800 hover:bg-slate-750 border border-slate-750 rounded-lg text-xs font-semibold text-slate-300 transition-colors">
                            画面に合わせる
                        </button>
                        <button id="zoom-in-btn" class="p-2 bg-slate-800 hover:bg-slate-750 border border-slate-750 rounded-lg text-slate-300 flex-1 flex justify-center transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m6-6H6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="border-t border-slate-800/60 my-2"></div>

                <!-- Crop Ratio Configuration -->
                <div class="space-y-3">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">クロップ縦横比</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button class="ratio-btn px-2.5 py-1.5 bg-slate-950 border border-indigo-500 text-indigo-400 hover:bg-indigo-950/20 text-xs font-medium rounded-lg transition-all" data-ratio="free">
                            自由
                        </button>
                        <button class="ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all" data-ratio="1:1">
                            1:1 (正方形)
                        </button>
                        <button class="ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all" data-ratio="16:9">
                            16:9
                        </button>
                        <button class="ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all" data-ratio="4:3">
                            4:3
                        </button>
                        <button class="ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all" data-ratio="3:2">
                            3:2
                        </button>
                        <button id="custom-ratio-btn" class="ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all" data-ratio="custom">
                            カスタム
                        </button>
                    </div>

                    <!-- Custom aspect ratio manual inputs -->
                    <div id="custom-ratio-inputs" class="hidden flex items-center gap-2 pt-1">
                        <input type="number" id="ratio-w" value="16" min="1" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-sm text-center text-slate-300 font-semibold focus:outline-none focus:border-indigo-500">
                        <span class="text-slate-500 text-xs">:</span>
                        <input type="number" id="ratio-h" value="10" min="1" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-sm text-center text-slate-300 font-semibold focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

            </div>

            <!-- Export / Bottom Action Area -->
            <div class="p-6 bg-slate-950 border-t border-slate-800/80 space-y-3">
                <button id="export-btn" class="w-full flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-900/40 transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transform group-hover:-translate-y-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    トリミングして保存
                </button>
                <div class="text-[10px] text-center text-slate-500 leading-relaxed">
                    オリジナル画質（ロスレス処理）で切り出されます。<br>回転やズームのズレは内部補正ロジックで自動的に100%排除されます。
                </div>
            </div>
            
        </aside>
    </main>

    <!-- App toast messages for custom alerts -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Configuration & State
        const state = {
            image: null,
            fileName: 'unnamed.png',
            
            // Image Transform state
            posX: 0,
            posY: 0,
            zoom: 1.0,      // zoom level (relative to fit size)
            rotation: 0,    // angle in degrees (-180 to 180)
            flipH: false,   // horizontal flip
            
            fitScale: 1.0,  // Scale required to fit the image on screen originally
            
            // Editor interaction modes: 'navigate' | 'crop'
            activeMode: 'navigate',
            
            // Crop selection state (represented in Canvas Coordinate system)
            cropRect: null, // { x, y, w, h }
            aspectRatio: 'free', // 'free' | '1:1' | '16:9' | etc.
            customRatioW: 16,
            customRatioH: 10,
            
            // Interaction Tracking
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragType: 'none', // 'none' | 'pan' | 'crop-draw' | 'crop-resize'
            activeHandle: null, // 'nw', 'n', 'ne', 'e', 'se', 's', 'sw', 'w'
            
            // For resizing interaction threshold
            handleRadius: 8
        };

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const dropzone = document.getElementById('dropzone');
        const placeholderUi = document.getElementById('placeholder-ui');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        
        // Mode switchers
        const modeNavBtn = document.getElementById('mode-nav-btn');
        const modeCropBtn = document.getElementById('mode-crop-btn');
        const quickTip = document.getElementById('quick-tip');

        // Transform UI Elements
        const rotationSlider = document.getElementById('rotation-slider');
        const rotationNumber = document.getElementById('rotation-number');
        const rotateCcw90 = document.getElementById('rotate-ccw-90');
        const rotateCw90 = document.getElementById('rotate-cw-90');
        const flipBtn = document.getElementById('flip-horizontal-btn');
        const resetBtn = document.getElementById('reset-transforms-btn');
        
        // Zoom UI Elements
        const zoomPercentage = document.getElementById('zoom-percentage');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomFitBtn = document.getElementById('zoom-fit-btn');
        
        // Crop ratio buttons
        const ratioBtns = document.querySelectorAll('.ratio-btn');
        const customRatioInputs = document.getElementById('custom-ratio-inputs');
        const ratioWInput = document.getElementById('ratio-w');
        const ratioHInput = document.getElementById('ratio-h');
        
        // File Info Header Elements
        const fileInfoPanel = document.getElementById('file-info');
        const loadedFileName = document.getElementById('loaded-file-name');
        const originalResolution = document.getElementById('original-resolution');
        
        // Action Button
        const exportBtn = document.getElementById('export-btn');

        // Listeners Setup
        function initApp() {
            // Drop & Drag upload listeners
            window.addEventListener('dragover', e => e.preventDefault());
            window.addEventListener('drop', e => e.preventDefault());
            
            dropzone.addEventListener('dragover', handleDragOver);
            dropzone.addEventListener('dragleave', handleDragLeave);
            dropzone.addEventListener('drop', handleDrop);
            placeholderUi.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);

            // Resizing window handler
            window.addEventListener('resize', handleResize);

            // Interaction Modes toggles
            modeNavBtn.addEventListener('click', () => setMode('navigate'));
            modeCropBtn.addEventListener('click', () => setMode('crop'));

            // Controls sync
            rotationSlider.addEventListener('input', e => {
                const val = parseInt(e.target.value);
                setRotation(val, 'slider');
            });
            rotationNumber.addEventListener('input', e => {
                let val = parseInt(e.target.value) || 0;
                val = Math.max(-180, Math.min(180, val));
                setRotation(val, 'number');
            });
            rotateCcw90.addEventListener('click', () => adjustRotation(-90));
            rotateCw90.addEventListener('click', () => adjustRotation(90));
            flipBtn.addEventListener('click', toggleHorizontalFlip);
            resetBtn.addEventListener('click', resetAllTransforms);

            // Zoom Listeners
            zoomInBtn.addEventListener('click', () => performZoom(1.2, null));
            zoomOutBtn.addEventListener('click', () => performZoom(1 / 1.2, null));
            zoomFitBtn.addEventListener('click', fitImageToViewport);
            
            // Mouse Wheel Zoom
            canvas.addEventListener('wheel', handleCanvasWheel, { passive: false });

            // Ratio Buttons
            ratioBtns.forEach(btn => {
                btn.addEventListener('click', () => selectRatio(btn));
            });
            ratioWInput.addEventListener('input', updateCustomRatio);
            ratioHInput.addEventListener('input', updateCustomRatio);

            // Canvas Mouse & Touch Interaction
            canvas.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            
            // Touch Support
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd);

            // Export Button
            exportBtn.addEventListener('click', exportCroppedImage);

            updateUIAvailability();
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl border text-sm font-semibold shadow-lg transition-all duration-350 transform translate-y-2 opacity-0 pointer-events-auto`;
            
            let bgBorder = 'bg-slate-900 border-slate-800 text-slate-100';
            let iconSvg = '';

            if (type === 'success') {
                bgBorder = 'bg-emerald-950/90 border-emerald-800/80 text-emerald-300';
                iconSvg = `<svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
            } else if (type === 'error') {
                bgBorder = 'bg-rose-950/90 border-rose-800/80 text-rose-300';
                iconSvg = `<svg class="w-5 h-5 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`;
            } else {
                iconSvg = `<svg class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
            }

            toast.innerHTML = `${iconSvg} <span>${message}</span>`;
            const container = document.getElementById('toast-container');
            container.appendChild(toast);

            // Reflow and animate
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // Auto dismiss
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function setMode(mode) {
            state.activeMode = mode;
            if (mode === 'navigate') {
                modeNavBtn.className = "flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-indigo-600 text-white shadow";
                modeCropBtn.className = "flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-slate-200";
                canvas.className = "max-w-full max-h-full block cursor-grab active:cursor-grabbing";
                quickTip.textContent = "「画像操作」モードでドラッグすると移動できます";
            } else {
                modeCropBtn.className = "flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-indigo-600 text-white shadow";
                modeNavBtn.className = "flex items-center justify-center gap-2 py-2.5 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-slate-200";
                canvas.className = "max-w-full max-h-full block cursor-crosshair";
                quickTip.textContent = "ドラッグで切り抜く範囲を選択できます（四角形の角で調整可能）";
                
                // If there's no crop rectangle yet, initialize one inside the viewport
                if (!state.cropRect && state.image) {
                    initCropRect();
                }
            }
            redraw();
        }

        function updateUIAvailability() {
            const hasImage = !!state.image;
            // Disable or enable interactive sidebar controls
            rotationSlider.disabled = !hasImage;
            rotationNumber.disabled = !hasImage;
            rotateCcw90.disabled = !hasImage;
            rotateCw90.disabled = !hasImage;
            flipBtn.disabled = !hasImage;
            resetBtn.disabled = !hasImage;
            zoomInBtn.disabled = !hasImage;
            zoomOutBtn.disabled = !hasImage;
            zoomFitBtn.disabled = !hasImage;
            modeNavBtn.disabled = !hasImage;
            modeCropBtn.disabled = !hasImage;
            exportBtn.disabled = !hasImage;
            
            ratioBtns.forEach(btn => btn.disabled = !hasImage);
            ratioWInput.disabled = !hasImage;
            ratioHInput.disabled = !hasImage;
        }

        function handleDragOver(e) {
            e.preventDefault();
            dropzone.classList.add('bg-slate-900', 'border-indigo-500/50');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            dropzone.classList.remove('bg-slate-900', 'border-indigo-500/50');
        }

        function handleDrop(e) {
            e.preventDefault();
            dropzone.classList.remove('bg-slate-900', 'border-indigo-500/50');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImageFromFile(file);
            } else {
                showToast('無効なファイル形式です。画像ファイルをアップロードしてください。', 'error');
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                loadImageFromFile(file);
            }
        }

        function loadImageFromFile(file) {
            const reader = new FileReader();
            state.fileName = file.name;
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    state.image = img;
                    
                    // Reset all states
                    state.rotation = 0;
                    state.flipH = false;
                    state.zoom = 1.0;
                    state.cropRect = null;
                    
                    rotationSlider.value = 0;
                    rotationNumber.value = 0;
                    
                    // Display details
                    loadedFileName.textContent = file.name;
                    originalResolution.textContent = `${img.width} × ${img.height}`;
                    fileInfoPanel.classList.remove('hidden');
                    fileInfoPanel.classList.add('flex');
                    
                    // Adjust UI viewport
                    placeholderUi.classList.add('hidden');
                    canvasWrapper.classList.remove('opacity-0');
                    
                    updateUIAvailability();
                    handleResize(); // Sets canvas resolution, fitting dimensions correctly
                    setMode('navigate'); // Standard mode on image load
                    showToast('画像を読み込みました！', 'success');
                };
                img.onerror = function() {
                    showToast('画像の読み込み中にエラーが発生しました。', 'error');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Responsive viewport resizing logic
        function handleResize() {
            if (!state.image) return;
            
            // Match canvas coordinates layout size of wrapper dynamically
            const containerWidth = canvasWrapper.clientWidth;
            const containerHeight = canvasWrapper.clientHeight;
            
            // Set dynamic drawing buffer size safely
            canvas.width = containerWidth;
            canvas.height = containerHeight;
            
            // Auto fit image scale to container first time or resize
            fitImageToViewport();
        }

        function fitImageToViewport() {
            if (!state.image) return;
            
            const cw = canvas.width;
            const ch = canvas.height;
            const iw = state.image.width;
            const ih = state.image.height;
            
            // Fits within 85% of viewport safely
            const marginFactor = 0.85;
            const scaleX = (cw * marginFactor) / iw;
            const scaleY = (ch * marginFactor) / ih;
            
            state.fitScale = Math.min(scaleX, scaleY);
            state.zoom = 1.0; // Reset user relative zoom to fit
            state.posX = cw / 2;
            state.posY = ch / 2;
            
            // If crop rectangle exists, adjust it, else build a proportional one
            if (state.cropRect) {
                // Adjust crop selector safely inside bounds of the screen
                initCropRect();
            }
            
            updateZoomDisplay();
            redraw();
        }

        // Rotates value between ranges smoothly
        function setRotation(degrees, triggerSource) {
            state.rotation = degrees;
            if (triggerSource !== 'slider') {
                rotationSlider.value = degrees;
            }
            if (triggerSource !== 'number') {
                rotationNumber.value = degrees;
            }
            redraw();
        }

        function adjustRotation(delta) {
            let nextRotation = state.rotation + delta;
            // Wrap degrees around [-180, 180]
            if (nextRotation > 180) nextRotation -= 360;
            if (nextRotation < -180) nextRotation += 360;
            setRotation(nextRotation);
        }

        function toggleHorizontalFlip() {
            state.flipH = !state.flipH;
            redraw();
        }

        function resetAllTransforms() {
            state.rotation = 0;
            state.flipH = false;
            setRotation(0);
            fitImageToViewport();
            showToast('トランスフォーム設定をリセットしました');
        }

        function updateZoomDisplay() {
            const actualScale = state.fitScale * state.zoom;
            // Display percentage formatted beautifully
            zoomPercentage.textContent = `${Math.round(actualScale * 100)}%`;
        }

        function handleCanvasWheel(e) {
            e.preventDefault();
            if (!state.image) return;

            // Determine zoom direction
            const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            
            // Get exact mouse location on canvas bounding space
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            performZoom(zoomFactor, { x: mouseX, y: mouseY });
        }

        function performZoom(factor, anchorPoint) {
            if (!state.image) return;

            const prevZoom = state.zoom;
            state.zoom *= factor;
            
            // Constrain zoom level securely
            state.zoom = Math.max(0.05, Math.min(40.0, state.zoom));
            const realizedFactor = state.zoom / prevZoom;

            if (anchorPoint) {
                // Focus zooming dynamically surrounding precise coordinates (Cursor position)
                state.posX = anchorPoint.x - (anchorPoint.x - state.posX) * realizedFactor;
                state.posY = anchorPoint.y - (anchorPoint.y - state.posY) * realizedFactor;
            } else {
                // Anchor zoom at the actual canvas center if point not specified
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                state.posX = centerX - (centerX - state.posX) * realizedFactor;
                state.posY = centerY - (centerY - state.posY) * realizedFactor;
            }

            updateZoomDisplay();
            redraw();
        }

        function initCropRect() {
            const cw = canvas.width;
            const ch = canvas.height;
            
            // Position crop center area occupying 50% screen safely
            const rectW = Math.min(cw, ch) * 0.5;
            const rectH = rectW; // Default Square 
            
            state.cropRect = {
                x: (cw - rectW) / 2,
                y: (ch - rectH) / 2,
                w: rectW,
                h: rectH
            };
            
            applyAspectRatioConstraint('nw'); // Align to ratio structure
        }

        function selectRatio(btnElement) {
            // Manage UI highlights
            document.querySelectorAll('.ratio-btn').forEach(btn => {
                btn.className = "ratio-btn px-2.5 py-1.5 bg-slate-800 border border-slate-750 text-slate-300 hover:bg-slate-750 text-xs font-medium rounded-lg transition-all";
            });
            btnElement.className = "ratio-btn px-2.5 py-1.5 bg-slate-950 border border-indigo-500 text-indigo-400 hover:bg-indigo-950/20 text-xs font-medium rounded-lg transition-all";

            const ratio = btnElement.getAttribute('data-ratio');
            state.aspectRatio = ratio;

            if (ratio === 'custom') {
                customRatioInputs.classList.remove('hidden');
                updateCustomRatio();
            } else {
                customRatioInputs.classList.add('hidden');
                if (state.cropRect) {
                    applyAspectRatioConstraint('se');
                    redraw();
                }
            }
        }

        function updateCustomRatio() {
            const w = parseFloat(ratioWInput.value) || 1;
            const h = parseFloat(ratioHInput.value) || 1;
            state.customRatioW = Math.max(0.1, w);
            state.customRatioH = Math.max(0.1, h);
            
            if (state.cropRect) {
                applyAspectRatioConstraint('se');
                redraw();
            }
        }

        // Constraints helper
        function applyAspectRatioConstraint(fixedAnchorCorner) {
            if (state.aspectRatio === 'free' || !state.cropRect) return;

            let ratio = 1.0;
            if (state.aspectRatio === '1:1') ratio = 1.0;
            else if (state.aspectRatio === '16:9') ratio = 16 / 9;
            else if (state.aspectRatio === '4:3') ratio = 4 / 3;
            else if (state.aspectRatio === '3:2') ratio = 3 / 2;
            else if (state.aspectRatio === 'custom') ratio = state.customRatioW / state.customRatioH;

            const rect = state.cropRect;

            // Recalculates rect height based on width resizing dynamically
            const newHeight = rect.w / ratio;
            
            if (fixedAnchorCorner.includes('n')) {
                // Height expands upwards, shifts Y
                rect.y = rect.y + rect.h - newHeight;
            }
            rect.h = newHeight;
        }

        function redraw() {
            if (!state.image) return;

            // 1. Clear viewport
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Render Image with active transform state
            ctx.save();
            
            // Translate origin to virtual image pivot coordinates
            ctx.translate(state.posX, state.posY);
            ctx.rotate(state.rotation * Math.PI / 180);
            
            // Flip horizontal if active
            ctx.scale(state.flipH ? -1 : 1, 1);
            
            // Total cumulative display scale factor
            const currentScale = state.fitScale * state.zoom;
            
            const drawW = state.image.width * currentScale;
            const drawH = state.image.height * currentScale;

            // Offset origin rendering centering image cleanly
            ctx.drawImage(state.image, -drawW / 2, -drawH / 2, drawW, drawH);
            
            ctx.restore();

            // 3. Draw crop overlay and boundaries
            if (state.cropRect && state.activeMode === 'crop') {
                drawCropOverlay();
            }
        }

        function drawCropOverlay() {
            const rect = state.cropRect;
            const cw = canvas.width;
            const ch = canvas.height;

            ctx.save();
            
            // Darken outside regions
            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)'; // Translucent Slate 900
            
            // Top overlay bar
            ctx.fillRect(0, 0, cw, rect.y);
            // Bottom overlay bar
            ctx.fillRect(0, rect.y + rect.h, cw, ch - (rect.y + rect.h));
            // Left overlay bar
            ctx.fillRect(0, rect.y, rect.x, rect.h);
            // Right overlay bar
            ctx.fillRect(rect.x + rect.w, rect.y, cw - (rect.x + rect.w), rect.h);

            // Draw bright cropping outline
            ctx.strokeStyle = '#6366f1'; // Indigo 500
            ctx.lineWidth = 2.5;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 8;
            ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
            ctx.shadowBlur = 0; // Restore

            // Draw Rule-of-Thirds Gridlines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            
            // Verticals
            ctx.beginPath();
            ctx.moveTo(rect.x + rect.w / 3, rect.y);
            ctx.lineTo(rect.x + rect.w / 3, rect.y + rect.h);
            ctx.moveTo(rect.x + (rect.w / 3) * 2, rect.y);
            ctx.lineTo(rect.x + (rect.w / 3) * 2, rect.y + rect.h);
            // Horizontals
            ctx.moveTo(rect.x, rect.y + rect.h / 3);
            ctx.lineTo(rect.x + rect.w, rect.y + rect.h / 3);
            ctx.moveTo(rect.x, rect.y + (rect.h / 3) * 2);
            ctx.lineTo(rect.x + rect.w, rect.y + (rect.h / 3) * 2);
            ctx.stroke();
            ctx.setLineDash([]); // Restore Solid lines

            // Draw Resize Handles (Rounded Corners/Handles)
            const handles = getHandleCoordinates();
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#4338ca'; // Deep Indigo 700
            ctx.lineWidth = 2;

            for (const key in handles) {
                const h = handles[key];
                ctx.beginPath();
                ctx.arc(h.x, h.y, state.handleRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }

            ctx.restore();
        }

        // Calculates exact locations of handles
        function getHandleCoordinates() {
            const r = state.cropRect;
            if (!r) return {};
            return {
                nw: { x: r.x, y: r.y },
                n:  { x: r.x + r.w / 2, y: r.y },
                ne: { x: r.x + r.w, y: r.y },
                e:  { x: r.x + r.w, y: r.y + r.h / 2 },
                se: { x: r.x + r.w, y: r.y + r.h },
                s:  { x: r.x + r.w / 2, y: r.y + r.h },
                sw: { x: r.x, y: r.y + r.h },
                w:  { x: r.x, y: r.y + r.h / 2 }
            };
        }

        // Get cursor position from both touch or mouse event
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleMouseDown(e) {
            if (!state.image) return;
            const pos = getPointerPos(e);

            state.isDragging = true;
            state.dragStartX = pos.x;
            state.dragStartY = pos.y;

            if (state.activeMode === 'navigate') {
                // Navigate/Pan Mode
                state.dragType = 'pan';
            } else if (state.activeMode === 'crop') {
                // Crop Region interactions
                const clickedHandle = getHandleAtPosition(pos.x, pos.y);
                if (clickedHandle) {
                    state.dragType = 'crop-resize';
                    state.activeHandle = clickedHandle;
                } else if (isInsideCropRect(pos.x, pos.y)) {
                    state.dragType = 'crop-pan';
                } else {
                    // Clicking outside creates a new cropping rectangle selection
                    state.dragType = 'crop-draw';
                    state.cropRect = {
                        x: pos.x,
                        y: pos.y,
                        w: 0,
                        h: 0
                    };
                }
            }
        }

        function handleMouseMove(e) {
            if (!state.isDragging || !state.image) {
                // Dynamically update mouse cursor over handles while hovering
                if (state.activeMode === 'crop' && !state.isDragging) {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? (e.touches[0] ? e.touches[0].clientX : e.clientX) : e.clientX;
                    const clientY = e.touches ? (e.touches[0] ? e.touches[0].clientY : e.clientY) : e.clientY;
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    
                    const handle = getHandleAtPosition(x, y);
                    if (handle) {
                        canvas.style.cursor = getCursorForHandle(handle);
                    } else if (isInsideCropRect(x, y)) {
                        canvas.style.cursor = 'move';
                    } else {
                        canvas.style.cursor = 'crosshair';
                    }
                }
                return;
            }

            // Touch move prevent iOS elastic bounce scrolling
            if (e.touches) {
                e.preventDefault();
            }

            const pos = getPointerPos(e);
            const dx = pos.x - state.dragStartX;
            const dy = pos.y - state.dragStartY;

            if (state.dragType === 'pan') {
                state.posX += dx;
                state.posY += dy;
                state.dragStartX = pos.x;
                state.dragStartY = pos.y;
                redraw();
            } else if (state.dragType === 'crop-pan') {
                // Displace crop bounding box safely within limits
                state.cropRect.x += dx;
                state.cropRect.y += dy;
                
                // Boundaries prevention
                state.cropRect.x = Math.max(0, Math.min(canvas.width - state.cropRect.w, state.cropRect.x));
                state.cropRect.y = Math.max(0, Math.min(canvas.height - state.cropRect.h, state.cropRect.y));

                state.dragStartX = pos.x;
                state.dragStartY = pos.y;
                redraw();
            } else if (state.dragType === 'crop-draw') {
                const currentX = Math.max(0, Math.min(canvas.width, pos.x));
                const currentY = Math.max(0, Math.min(canvas.height, pos.y));
                
                state.cropRect.x = Math.min(state.dragStartX, currentX);
                state.cropRect.y = Math.min(state.dragStartY, currentY);
                state.cropRect.w = Math.abs(state.dragStartX - currentX);
                state.cropRect.h = Math.abs(state.dragStartY - currentY);

                if (state.aspectRatio !== 'free') {
                    applyAspectRatioConstraint('se');
                }
                redraw();
            } else if (state.dragType === 'crop-resize') {
                resizeCropRect(pos.x, pos.y);
                redraw();
            }
        }

        function handleMouseUp() {
            state.isDragging = false;
            state.dragType = 'none';
            state.activeHandle = null;
            if (state.activeMode === 'navigate') {
                canvas.style.cursor = 'grab';
            }
        }

        // Touch event bridges (PC mouse mappings)
        function handleTouchStart(e) {
            if (e.touches.length === 1) {
                handleMouseDown(e);
            }
        }

        function handleTouchMove(e) {
            if (e.touches.length === 1) {
                handleMouseMove(e);
            }
        }

        function handleTouchEnd(e) {
            handleMouseUp();
        }

        function isInsideCropRect(x, y) {
            const r = state.cropRect;
            if (!r) return false;
            return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
        }

        function getHandleAtPosition(x, y) {
            const handles = getHandleCoordinates();
            const hitRadius = state.handleRadius * 1.5; // Slightly larger touch targets

            for (const key in handles) {
                const h = handles[key];
                const distSq = (x - h.x) * (x - h.x) + (y - h.y) * (y - h.y);
                if (distSq <= hitRadius * hitRadius) {
                    return key;
                }
            }
            return null;
        }

        function getCursorForHandle(handle) {
            switch(handle) {
                case 'nw': case 'se': return 'nwse-resize';
                case 'ne': case 'sw': return 'nesw-resize';
                case 'n':  case 's':  return 'ns-resize';
                case 'e':  case 'w':  return 'ew-resize';
                default: return 'default';
            }
        }

        function resizeCropRect(mx, my) {
            const r = state.cropRect;
            const handle = state.activeHandle;
            const minSize = 25; // minimum width/height in px

            // Clamp inputs inside visible coordinates
            mx = Math.max(0, Math.min(canvas.width, mx));
            my = Math.max(0, Math.min(canvas.height, my));

            const right = r.x + r.w;
            const bottom = r.y + r.h;

            if (state.aspectRatio === 'free') {
                // Free aspect ratio resizing logic
                switch(handle) {
                    case 'nw':
                        r.x = Math.min(right - minSize, mx);
                        r.y = Math.min(bottom - minSize, my);
                        r.w = right - r.x;
                        r.h = bottom - r.y;
                        break;
                    case 'ne':
                        r.w = Math.max(minSize, mx - r.x);
                        r.y = Math.min(bottom - minSize, my);
                        r.h = bottom - r.y;
                        break;
                    case 'se':
                        r.w = Math.max(minSize, mx - r.x);
                        r.h = Math.max(minSize, my - r.y);
                        break;
                    case 'sw':
                        r.x = Math.min(right - minSize, mx);
                        r.w = right - r.x;
                        r.h = Math.max(minSize, my - r.y);
                        break;
                    case 'n':
                        r.y = Math.min(bottom - minSize, my);
                        r.h = bottom - r.y;
                        break;
                    case 's':
                        r.h = Math.max(minSize, my - r.y);
                        break;
                    case 'e':
                        r.w = Math.max(minSize, mx - r.x);
                        break;
                    case 'w':
                        r.x = Math.min(right - minSize, mx);
                        r.w = right - r.x;
                        break;
                }
            } else {
                // Maintain locked Aspect Ratio during resize
                let ratio = 1.0;
                if (state.aspectRatio === '1:1') ratio = 1.0;
                else if (state.aspectRatio === '16:9') ratio = 16 / 9;
                else if (state.aspectRatio === '4:3') ratio = 4 / 3;
                else if (state.aspectRatio === '3:2') ratio = 3 / 2;
                else if (state.aspectRatio === 'custom') ratio = state.customRatioW / state.customRatioH;

                let nw, nh;

                switch(handle) {
                    case 'se':
                    case 'e':
                    case 's':
                        // Base on horizontal delta
                        nw = Math.max(minSize, mx - r.x);
                        nh = nw / ratio;
                        if (r.y + nh > canvas.height) {
                            nh = canvas.height - r.y;
                            nw = nh * ratio;
                        }
                        r.w = nw;
                        r.h = nh;
                        break;

                    case 'sw':
                    case 'w':
                        nw = Math.max(minSize, right - mx);
                        nh = nw / ratio;
                        if (r.y + nh > canvas.height) {
                            nh = canvas.height - r.y;
                            nw = nh * ratio;
                        }
                        r.x = right - nw;
                        r.w = nw;
                        r.h = nh;
                        break;

                    case 'ne':
                    case 'n':
                        nw = Math.max(minSize, mx - r.x);
                        nh = nw / ratio;
                        if (bottom - nh < 0) {
                            nh = bottom;
                            nw = nh * ratio;
                        }
                        r.y = bottom - nh;
                        r.w = nw;
                        r.h = nh;
                        break;

                    case 'nw':
                        nw = Math.max(minSize, right - mx);
                        nh = nw / ratio;
                        if (bottom - nh < 0) {
                            nh = bottom;
                            nw = nh * ratio;
                        }
                        r.x = right - nw;
                        r.y = bottom - nh;
                        r.w = nw;
                        r.h = nh;
                        break;
                }
            }
        }

        // Export with 100% geometric correctness (NO mathematical coordinate offsets/deviations)
        function exportCroppedImage() {
            if (!state.image || !state.cropRect) {
                showToast('クロップする範囲が選択されていません。', 'error');
                return;
            }

            // Export Progress Alert
            showToast('高解像度画像を生成中...', 'info');

            setTimeout(() => {
                try {
                    const img = state.image;
                    const crop = state.cropRect;
                    
                    // Total cumulative scale factors on screen
                    const totalScale = state.fitScale * state.zoom;
                    
                    // Inverse mapping factor to scale export canvas to match the ORIGINAL high-resolution pixel grid
                    const F = 1 / totalScale;
                    
                    const exportW = Math.round(crop.w * F);
                    const exportH = Math.round(crop.h * F);

                    // Safety boundaries check
                    if (exportW <= 0 || exportH <= 0) {
                        throw new Error("トリミングサイズが無効です");
                    }

                    // Create offline rendering frame buffer
                    const exportCanvas = document.createElement('canvas');
                    exportCanvas.width = exportW;
                    exportCanvas.height = exportH;

                    const exportCtx = exportCanvas.getContext('2d');
                    
                    // Maximizing smoothing filter algorithms
                    exportCtx.imageSmoothingEnabled = true;
                    exportCtx.imageSmoothingQuality = 'high';

                    exportCtx.save();
                    
                    // Translate standard relative scale to original resolution coordinates
                    exportCtx.scale(F, F);
                    
                    // Pivot relative translate positioning offsets mapping to cropped rect top-left anchor point
                    exportCtx.translate(state.posX - crop.x, state.posY - crop.y);
                    
                    // Angle Rotation Matrix
                    exportCtx.rotate(state.rotation * Math.PI / 180);
                    
                    // Scale Horizontal Flip if requested
                    exportCtx.scale(state.flipH ? -1 : 1, 1);
                    
                    // Compute matching dimensions utilizing fitScale & user zoom state relative scale factors
                    const drawW = img.width * totalScale;
                    const drawH = img.height * totalScale;
                    
                    // Render image at precise mathematical offset coordinates
                    exportCtx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
                    
                    exportCtx.restore();

                    // Convert frame buffer to raw data for download
                    const fileExtension = state.fileName.split('.').pop() || 'png';
                    const outputFormat = fileExtension.toLowerCase() === 'jpg' || fileExtension.toLowerCase() === 'jpeg' 
                        ? 'image/jpeg' 
                        : 'image/png';
                    
                    const quality = 0.95; // high quality output
                    const dataUrl = exportCanvas.toDataURL(outputFormat, quality);
                    
                    // Perform silent automated browser download trigger
                    const downloadLink = document.createElement('a');
                    const baseName = state.fileName.substring(0, state.fileName.lastIndexOf('.')) || 'processed_image';
                    downloadLink.download = `${baseName}_cropped.${fileExtension}`;
                    downloadLink.href = dataUrl;
                    
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    showToast('画像の切り抜き保存が完了しました！', 'success');
                } catch (e) {
                    console.error(e);
                    showToast(`エラーが発生しました: ${e.message}`, 'error');
                }
            }, 100);
        }

        // Initialize script logic binds
        window.onload = function() {
            initApp();
        };
    </script>
</body>
